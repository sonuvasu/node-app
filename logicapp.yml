#To deploy Azure Logic Apps (Standard) workflows along with all necessary configuration files (connections.json, host.json) 
#using GitHub Actions and OpenID Connect (OIDC), you must use passwordless authentication. 
#Logic App Standard runs on top of the Azure Functions runtime, meaning you can package and deploy it seamlessly using a zip deployment mechanism.

#Step 1: Set Up Azure OIDC (Workload Identity)Before modifying your GitHub workflow, 
#you must establish trust between GitHub and Microsoft Entra ID without storing explicit passwords or secrets.Create an App Registration or User-Assigned Managed Identity (UMI) in the Azure Portal.Assign the Contributor or Website Contributor role to this identity at the Scope of your Resource Group or Subscription.Navigate to your identity's Federated Credentials blade and click Add credential.Select GitHub Actions deploying Azure resources.Provide your GitHub Organization/Owner, Repository, and choose the entity type (e.g., Branch named main).
#Copy the Client ID, Tenant ID, and Subscription ID values.

#Step 2: Configure GitHub SecretsStore your non-sensitive identity metadata variables in your GitHub Repository under Settings > Secrets and variables > Actions:
#AZURE_CLIENT_ID: The unique Application/Client ID generated from Azure.
#AZURE_TENANT_ID: Your Azure Active Directory Tenant ID.
#AZURE_SUBSCRIPTION_ID: The ID of your target subscription

#Step 3: Create the GitHub Actions WorkflowCreate a file named .github/workflows/deploy-logic-app.yml in your code repository. 
#This configuration uses the explicit id-token: write token authorization parameter required by OIDC.

name: Deploy Logic App Standard Workflows

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write   # Required for requesting the OIDC JWT token
  contents: read    # Required to checkout the source repository contents

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout the source code repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Package all workflows and mandatory system configurations into a Zip archive
      - name: Package Logic App Artifacts
        run: |
          zip -r logicapp.zip . -x ".git/*" ".github/*" ".vscode/*"

      # 3. Securely authenticate with Azure via passwordless OIDC Federation
      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # 4. Deploy your packaged artifacts via the Azure Functions action
      - name: Deploy Workflows to Logic App Standard
        uses: azure/functions-action@v1
        with:
          app-name: 'your-logic-app-name-here' # Replace with your Standard Logic App target name
          package: './logicapp.zip'


Step 4: Ensure Correct Project StructureTo prevent your workflows from disappearing or failing during runtime, 
verify your repository root follows the exact Azure Functions project structure:

├── .github/workflows/
│   └── deploy-logic-app.yml   # Your deployment workflow
├── workflow-alpha/
│   └── workflow.json          # Logic App workflow code definition
├── workflow-beta/
│   └── workflow.json          # Additional workflow code definition
├── host.json                  # Global runtime settings configuration
├── connections.json           # API Connector definitions and managed endpoints
└── local.settings.json        # Application Settings (Ignored or tokenized across target stages)
