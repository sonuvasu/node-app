# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: SonarQube Code Analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  sonarcloud:
    name: Test and Analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones must be disabled for a better relevancy of analysis

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '26'
          #cache: 'npm'
          #cache-dependency-path: 'package-lock.json'

      - name: Install Dependencies
        run: npm install
        #run: npm ci

      - name: Run Tests and Generate Coverage
        run: npm run test:coverage

      - name: Run SonarQube Scan
        uses: sonarsource/sonarcloud-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Enforce SonarQube Quality Gate
        uses: sonarsource/sonarcloud-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
